<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Call Recorder · Japan — Onboarding & Paywall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090a;
      --ink: #ffffff;
      --ink-2: #b8c0c2;
      --ink-3: #6b7376;
      --line: rgba(255,255,255,0.08);
      --line-2: rgba(255,255,255,0.14);
      --card: #101314;
      --card-2: #161a1c;
      --accent: #1FE07A;    /* neon green */
      --accent-ink: #04130a;
      --accent-soft: rgba(31,224,122,0.12);
      --warn: #ff4d4f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background: radial-gradient(1200px 800px at 50% -10%, #15201a 0%, #07090a 55%, #050606 100%);
      color: var(--ink);
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Inter', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      padding: 32px 16px 80px;
    }
    /* Top header strip */
    .frame-header {
      display: flex; align-items: center; gap: 14px;
      color: var(--ink-2); font-size: 13px; letter-spacing: 0.04em;
    }
    .frame-header .dot {
      width: 8px; height: 8px; border-radius: 99px; background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .frame-header b { color: var(--ink); font-weight: 600; }
    .frame-header .sep { width: 1px; height: 12px; background: var(--line-2); }

    /* Stage / nav buttons live outside the device */
    .stage {
      display: flex; align-items: center; gap: 18px;
    }
    .nav-btn {
      width: 44px; height: 44px; border-radius: 999px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--line-2);
      color: var(--ink); display: grid; place-items: center;
      cursor: pointer; transition: background 0.15s, transform 0.15s;
      font-size: 18px;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.10); }
    .nav-btn:active:not(:disabled) { transform: scale(0.94); }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* Dots / progress indicator */
    .progress {
      display: flex; gap: 6px; align-items: center; justify-content: center;
      padding: 8px 14px; border-radius: 999px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    }
    .progress .seg {
      height: 4px; border-radius: 999px; background: rgba(255,255,255,0.14);
      transition: width 0.3s, background 0.3s;
    }
    .progress .seg.active { background: var(--accent); }
    .progress .label { color: var(--ink-2); font-size: 12px; margin-right: 4px; }

    /* Screen utilities (everything inside the device uses these) */
    .ja-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; letter-spacing: 0.08em; font-weight: 600;
      color: var(--accent);
      padding: 5px 10px; border-radius: 999px;
      background: var(--accent-soft); border: 1px solid rgba(31,224,122,0.25);
      text-transform: uppercase;
    }
    .ja-headline {
      font-size: 24px; line-height: 1.35; font-weight: 800; color: var(--ink);
      letter-spacing: -0.01em; margin: 14px 0 10px;
    }
    .ja-body {
      font-size: 13.5px; line-height: 1.7; color: var(--ink-2);
    }
    .feature-bullets {
      list-style: none; margin: 14px 0 0; padding: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .feature-bullets li {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px; line-height: 1.55; color: var(--ink);
    }
    .feature-bullets .check {
      flex: none; width: 18px; height: 18px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
      display: grid; place-items: center;
      font-size: 11px; font-weight: 900; margin-top: 1px;
    }
    .feature-bullets li small {
      display: block; color: var(--ink-3); font-size: 11.5px; margin-top: 2px;
      line-height: 1.5;
    }

    /* Primary CTA used inside the device */
    .cta {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 54px; border-radius: 16px;
      background: var(--accent); color: var(--accent-ink);
      font-weight: 800; font-size: 16px; border: none; cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 20px rgba(31,224,122,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .cta:active { transform: translateY(1px); }
    .cta.secondary {
      background: rgba(255,255,255,0.06); color: var(--ink);
      box-shadow: none; border: 1px solid var(--line-2);
    }
    .cta.ghost {
      background: transparent; color: var(--ink-2); box-shadow: none;
      height: 40px; font-size: 13px; font-weight: 500;
    }

    /* Phone-call mockup (mini iPhone shown inside an onboarding screen) */
    .mini-phone {
      position: relative; border-radius: 26px; overflow: hidden;
      background: #000; border: 6px solid #1c1f20;
      box-shadow: 0 18px 40px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .mini-statusbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px 4px; font-size: 10px; color: #fff; font-weight: 600;
    }

    /* Comparison table on paywall */
    .compare {
      width: 100%; border-collapse: separate; border-spacing: 0;
      background: var(--card); border-radius: 16px; overflow: hidden;
      border: 1px solid var(--line);
    }
    .compare th, .compare td {
      padding: 12px 14px; text-align: left; font-size: 13px;
      border-bottom: 1px solid var(--line);
    }
    .compare tr:last-child th, .compare tr:last-child td { border-bottom: none; }
    .compare th { color: var(--ink); font-weight: 600; }
    .compare thead th {
      font-size: 11.5px; color: var(--ink-3); letter-spacing: 0.04em;
      text-transform: uppercase; font-weight: 700;
      background: rgba(255,255,255,0.02);
    }
    .compare thead th.pro { color: var(--accent); }
    .compare .yes { color: var(--accent); font-weight: 800; font-size: 16px; text-align: center; }
    .compare .no { color: rgba(255,255,255,0.25); font-weight: 700; font-size: 14px; text-align: center; }
    .compare td.col-free, .compare th.col-free { text-align: center; width: 70px; }
    .compare td.col-pro, .compare th.col-pro { text-align: center; width: 70px; background: rgba(31,224,122,0.04); }

    /* FAQ */
    .faq {
      background: var(--card); border-radius: 16px;
      border: 1px solid var(--line); overflow: hidden;
    }
    .faq-item { border-bottom: 1px solid var(--line); }
    .faq-item:last-child { border-bottom: none; }
    .faq-q {
      width: 100%; background: none; border: none;
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
      color: var(--ink); font-family: inherit; font-size: 13.5px; font-weight: 600;
      text-align: left; cursor: pointer; gap: 12px;
    }
    .faq-q .chev {
      flex: none; width: 22px; height: 22px; border-radius: 999px;
      background: rgba(255,255,255,0.05); display: grid; place-items: center;
      transition: transform 0.2s; color: var(--ink-2); font-size: 11px;
    }
    .faq-item.open .chev { transform: rotate(180deg); color: var(--accent); }
    .faq-a {
      max-height: 0; overflow: hidden; transition: max-height 0.25s ease;
      padding: 0 16px; color: var(--ink-2); font-size: 13px; line-height: 1.65;
    }
    .faq-item.open .faq-a { max-height: 200px; padding: 0 16px 14px; }

    /* Scrollbar hide inside the phone */
    .phone-scroll::-webkit-scrollbar { width: 0; }
    .phone-scroll { scrollbar-width: none; }

    /* Footer */
    .foot {
      max-width: 480px; text-align: center; color: var(--ink-3);
      font-size: 11.5px; line-height: 1.6;
    }
    .foot b { color: var(--ink-2); }
    .foot a { color: var(--accent); text-decoration: none; }

    /* Fade between screens */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .screen-key { animation: fadeIn 0.28s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="mockups.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="paywall.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
