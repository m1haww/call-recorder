<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Call Recorder Onboarding</title>
<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-onboarding.jsx"></script>
<script type="text/babel" src="screens-paywall.jsx"></script>

<script type="text/babel" data-presets="react">
const STEPS = [
  'welcome', 'recording', 'transcript', 'organize', 'trust',
  'personalize', 'notifications', 'loading', 'paywall', 'success'
];

function App() {
  const [stepIdx, setStepIdx] = React.useState(0);
  const step = STEPS[stepIdx];
  const go = (delta) => setStepIdx(i => Math.max(0, Math.min(STEPS.length - 1, i + delta)));
  const reset = () => setStepIdx(0);

  // Wrap in transition key so each screen re-mounts on change (animations replay)
  const key = step + '-' + stepIdx;

  let screen;
  switch (step) {
    case 'welcome':       screen = <ScreenWelcome onNext={() => go(1)} />; break;
    case 'trust':         screen = <ScreenTrust onNext={() => go(1)} onBack={() => go(-1)} />; break;
    case 'recording':     screen = <ScreenRecording onNext={() => go(1)} onBack={() => go(-1)} />; break;
    case 'transcript':    screen = <ScreenTranscript onNext={() => go(1)} onBack={() => go(-1)} />; break;
    case 'organize':      screen = <ScreenOrganize onNext={() => go(1)} onBack={() => go(-1)} />; break;
    case 'personalize':   screen = <ScreenPersonalize onNext={() => go(1)} onBack={() => go(-1)} />; break;
    case 'notifications': screen = <ScreenNotifications onNext={() => go(1)} onBack={() => go(-1)} />; break;
    case 'loading':       screen = <ScreenLoading onDone={() => go(1)} />; break;
    case 'paywall':       screen = <ScreenPaywall onClose={() => setStepIdx(STEPS.indexOf('success'))} onPurchase={() => setStepIdx(STEPS.indexOf('success'))} />; break;
    case 'success':       screen = <ScreenSuccess onRestart={reset} />; break;
  }

  return (
    <div className="app-shell">
      {/* Step navigation chip (out-of-frame helper) */}
      <StepNav stepIdx={stepIdx} setStepIdx={setStepIdx} />
      <div data-screen-label={String(stepIdx + 1).padStart(2,'0') + ' ' + step}>
        <IOSDevice width={390} height={844} dark={true}>
          <div key={key} style={{ position: 'absolute', inset: 0 }}>
            {screen}
          </div>
        </IOSDevice>
      </div>
    </div>
  );
}

function StepNav({ stepIdx, setStepIdx }) {
  const labels = ['Welcome','Record','Transcript','Organize','Trust','Personalize','Notifs','Loading','Paywall','Done'];
  return (
    <div style={{
      position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
      display: 'flex', gap: 4, padding: 6,
      background: 'rgba(20,24,20,0.7)',
      backdropFilter: 'blur(20px)',
      borderRadius: 999,
      border: '1px solid rgba(255,255,255,0.08)',
      zIndex: 100,
      boxShadow: '0 12px 40px rgba(0,0,0,0.5)',
    }}>
      {labels.map((l, i) => (
        <button key={i} onClick={() => setStepIdx(i)} style={{
          padding: '6px 10px', borderRadius: 999,
          background: i === stepIdx ? 'rgba(78,245,66,0.18)' : 'transparent',
          color: i === stepIdx ? '#4ef542' : 'rgba(255,255,255,0.55)',
          border: 'none', cursor: 'pointer',
          fontSize: 11, fontWeight: 600, letterSpacing: -0.1,
          transition: 'all 0.15s',
        }}>{i + 1}. {l}</button>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
